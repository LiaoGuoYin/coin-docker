# https://hub.docker.com/r/shellngn/pro/

version: "3"

services:
  shellngn:
    image: shellngn/pro:latest
    container_name: shellngn
    ports:
      - 8080:8080
    environment:
      - HOST=0.0.0.0
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/home/node/server/data
    restart: always
