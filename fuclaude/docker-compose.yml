# https://linux.do/t/topic/134001
# https://linux.do/t/topic/136358
# https://github.com/wozulong/fuclaude
# https://hub.docker.com/r/pengzhile/fuclaude

version: "3"

services:
  fuclaude:
    image: pengzhile/fuclaude:latest
    container_name: fuclaude
    ports:
      - "0.0.0.0:8181:8181"
    environment:
      - TZ=Asia/Shanghai
      - FUCLAUDE_BIND=0.0.0.0:8181
      - FUCLAUDE_TIMEOUT=600
      - FUCLAUDE_PROXY_URL=
      - FUCLAUDE_REAL_LOGOUT=false
      - FUCLAUDE_SITE_PASSWORD=
      - FUCLAUDE_COOKIE_SECRET=1234567890abcdefghijklmnopqrstuv
      - FUCLAUDE_OPENAI_BASE_URL=https://api.openai.com/v1
      - FUCLAUDE_OPENAI_API_KEY=demo
      - FUCLAUDE_MODERATION_ENABLED=false
      - FUCLAUDE_SIGNUP_ENABLED=false
      - FUCLAUDE_SHOW_SESSION_KEY=true
    restart: unless-stopped
