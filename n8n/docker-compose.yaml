# https://docs.n8n.io/hosting/installation/server-setups/docker-compose/#6-create-docker-compose-file

version: "3"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=${N8N_DOMAIN}
      - WEBHOOK_URL=https://${N8N_DOMAIN}
    volumes:
      - ./data:/home/node/.n8n
    restart: always
