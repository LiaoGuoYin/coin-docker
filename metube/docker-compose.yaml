# https://github.com/alexta69/metube

version: "3"

services:
  metube:
    image: alexta69/metube:latest
    container_name: metube
    ports:
      - 8081:8081
    volumes:
      - ./data:/downloads
      - ./config:/cookies
    environment:
      - YTDL_OPTIONS={"cookiefile":"/cookies/cookies.txt"}
    restart: always
